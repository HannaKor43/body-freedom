# Netlify configuration file for Vite deployment

[build]
  # The command run by Netlify to build the application
  command = "npm run build"
  # The folder containing the production bundle to publish
  publish = "dist"

# Redirect rules for Single Page Application (SPA) routing
# This ensures that all requests to paths other than static files are rewritten
# to index.html, allowing client-side React routers (if used or added in the future) to handle routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security and caching headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking attacks by forbidding framing
    X-Frame-Options = "DENY"
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Referrer policy to protect user privacy
    Referrer-Policy = "same-origin"
    # Restrict loading of resources to trust sources
    X-XSS-Protection = "1; mode=block"

# Optimize caching for static assets generated by Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache static assets long-term as they contain content hashes in production
    Cache-Control = "public, max-age=31536000, immutable"
